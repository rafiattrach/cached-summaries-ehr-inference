# @package _global_

defaults:
  - override /data: pytorch_dataset
  - override /logger: csv
  - override /model/backbone: triplet_transformer_encoder
  - override /model/input_encoder: hybrid_summary_encoder
  - override /model: supervised
  - override /trainer: gpu

tags:
  - "mimiciv"
  - "hybrid_summary"
  - "film"
  - "transformer_encoder"

seed: 0

trainer:
  min_epochs: 1
  max_epochs: 10
  gradient_clip_val: 1.0
  accelerator: gpu
  devices: 1
  precision: 32
  strategy: auto

data:
  dataloader:
    batch_size: 64
    num_workers: 6
  max_seq_len: 64
  collate_type: "triplet"
  subsequence_sampling_strategy: "to_end"
  do_include_subject_id: true
  do_include_subsequence_indices: true
  do_include_end_time: true

model:
  token_dim: 128
  optimizer:
    lr: 0.001
  backbone:
    n_layers: 2
    nheads: 4
    dropout: 0
  input_encoder:
    summary:
      enabled: true
      variant: recent
      S: 256
      apply: film
      policy: omit_if_L_lt_N
      strict: true

logger:
  csv:
    save_dir: ${paths.output_dir}
